name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # per creare la release e caricare l'asset

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6
      # https://github.com/actions/setup-node
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Pack library
        run: cd dist/ngx-toastr && npm pack
      - name: Create GitHub Release with package asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          dist/ngx-toastr/*.tgz
          --title "${GITHUB_REF_NAME}"
          --generate-notes
